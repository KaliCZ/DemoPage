# demopage application stack for the OCI VM: the two API slots (blue/green).
#
# Synced to the deploy user's home (~/docker-compose.yml) by the CI/CD job and
# driven with `docker compose -p kalandra`. Relative paths resolve against that
# home directory (the project directory).
#
# The reverse proxy is NOT here — Caddy is shared infrastructure (it fronts
# every app on the box, e.g. hampap too), provisioned once per machine and
# owned by the host setup, not by this deploy. See docs/SETUP.md §3.3. This
# deploy only writes its own Caddy site fragment and reloads the shared Caddy.
#
# Reboot survival: both slots use `restart: unless-stopped`, so the Docker
# daemon brings the active one back on boot — except a slot that was explicitly
# `docker stop`ped during a swap, which stays down. That keeps exactly one API
# slot active after a reboot.
#
# IMAGE_REF is the digest-pinned API image; the deploy job writes it to
# ~/compose.env (loaded via --env-file) so a restart can never silently run a
# different build than the one that was health-checked.

services:
  kalandra-api-blue:
    image: ${IMAGE_REF}
    container_name: kalandra-api-blue
    network_mode: host
    env_file:
      - ./kalandra-api.env
    environment:
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_ENVIRONMENT: Production
    restart: unless-stopped

  kalandra-api-green:
    image: ${IMAGE_REF}
    container_name: kalandra-api-green
    network_mode: host
    env_file:
      - ./kalandra-api.env
    environment:
      ASPNETCORE_HTTP_PORTS: "8081"
      ASPNETCORE_ENVIRONMENT: Production
    restart: unless-stopped
