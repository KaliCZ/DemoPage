# Shared Caddy reverse proxy — fronts every app on the box (demopage, hampap, …).
#
# This is host-level shared infrastructure, NOT part of any app's CI/CD. It is
# installed once per machine (see docs/SETUP.md §3.3): copy this file and the
# base Caddyfile to /srv/caddy and `docker compose -p caddy up -d`. Apps never
# touch Caddy's lifecycle — they only drop a fragment in ./sites and reload.
#
# Run from /srv/caddy, so the relative paths below resolve there:
#   /srv/caddy/Caddyfile      base config; imports sites/*.caddy
#   /srv/caddy/sites/         one *.caddy fragment per app (app-owned, app-written)
#   /srv/caddy/certs/         Cloudflare Origin certs, one pair per site (root-owned)
#
# restart: unless-stopped + an enabled docker.service bring Caddy back on boot.

services:
  caddy:
    image: docker.io/library/caddy:2-alpine
    container_name: caddy
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./sites:/etc/caddy/sites:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
