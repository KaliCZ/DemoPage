services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kalandra
      POSTGRES_PASSWORD: kalandra_dev
      POSTGRES_DB: kalandra
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalandra"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Kalandra.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=kalandra;Username=kalandra;Password=kalandra_dev
      - Auth__SupabaseProjectUrl=${SUPABASE_PROJECT_URL}
      - Auth__SupabaseJwtSecret=${SUPABASE_JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - full

volumes:
  pgdata:
