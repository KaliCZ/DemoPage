version: 2
updates:
  # GitHub Actions — SHA-pinned third-party actions get auto-bumped here
  # so we keep supply-chain protection without manual upkeep.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # Backend — NuGet packages across all csproj files in the solution.
  # Points at repo root so Dependabot picks up DemoPage.slnx as the entry point.
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    groups:
      nuget:
        patterns:
          - "*"

  # Frontend — npm packages from frontend/package.json.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      npm:
        patterns:
          - "*"

  # Root — npm packages from the repo-root package.json (dev tooling, hooks, etc.).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm:
        patterns:
          - "*"
