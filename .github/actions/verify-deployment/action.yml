# ============================================================================
# Verify Deployment — Reusable GitHub Composite Action
# ============================================================================
#
# Polls a health endpoint until it returns a healthy response, with retries.
# Designed for post-deploy verification in CI/CD pipelines.
#
# PUBLISHING TO A SEPARATE REPO
# ──────────────────────────────
# To make this action reusable across repositories:
#
# 1. Create a new repo (e.g., "kalandra/verify-deployment")
# 2. Copy this file to the repo root as "action.yml"
# 3. Commit and tag a release:
#      git tag v1
#      git push origin v1
# 4. Reference it from any workflow:
#      - uses: kalandra/verify-deployment@v1
#        with:
#          health-url: https://api.example.com/health
#
# For updates, push a new tag (v1.1.0) and move the v1 tag:
#      git tag -d v1
#      git push origin :refs/tags/v1
#      git tag v1
#      git push origin v1
#
# OPTIONAL: Add a README.md to the repo with usage examples.
# ============================================================================

name: 'Verify Deployment'
description: 'Polls a health endpoint with retries to verify a deployment is live and healthy.'

inputs:
  health-url:
    required: true
    description: 'The full URL of the health endpoint (e.g., https://api.example.com/health)'
  max-attempts:
    required: false
    default: '20'
    description: 'Maximum number of health check attempts before failing'
  retry-interval:
    required: false
    default: '5'
    description: 'Seconds to wait between retries'

runs:
  using: "composite"
  steps:
    - name: Verify deployment health
      shell: bash
      run: |
        HEALTH_URL="${{ inputs.health-url }}"
        MAX_ATTEMPTS=${{ inputs.max-attempts }}
        RETRY_INTERVAL=${{ inputs.retry-interval }}
        ATTEMPT=1

        echo "Verifying deployment at: $HEALTH_URL"
        echo "Max attempts: $MAX_ATTEMPTS, retry interval: ${RETRY_INTERVAL}s"

        until curl -sf "$HEALTH_URL" > /dev/null 2>&1; do
          if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
            echo "::error::Deployment verification failed after $MAX_ATTEMPTS attempts"
            echo "Health endpoint $HEALTH_URL did not return a healthy response."
            exit 1
          fi
          echo "Attempt $ATTEMPT/$MAX_ATTEMPTS failed. Retrying in ${RETRY_INTERVAL}s..."
          sleep "$RETRY_INTERVAL"
          ATTEMPT=$((ATTEMPT + 1))
        done

        echo "Deployment verified successfully on attempt $ATTEMPT."
        echo "::notice::Health check passed at $HEALTH_URL"
