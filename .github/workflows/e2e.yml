name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: kalandra
          POSTGRES_PASSWORD: kalandra_dev
          POSTGRES_DB: kalandra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kalandra"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Build backend
        run: dotnet build -c Release
        working-directory: backend

      - name: Start backend
        run: |
          cd backend/src/Kalandra.Api
          dotnet run -c Release --no-build --urls http://localhost:5000 &
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=kalandra;Username=kalandra;Password=kalandra_dev"
          Auth__SupabaseProjectUrl: "http://localhost:54321"
          Auth__SupabaseJwtSecret: "super-secret-jwt-token-with-at-least-32-characters-long"
          Auth__AdminUserIds__0: "admin-user-id"
          ASPNETCORE_ENVIRONMENT: Development

      - name: Wait for backend
        uses: KaliCZ/verify-deployment@v1
        with:
          health-url: http://localhost:5000/api/health
          max-attempts: 30
          retry-interval: 2

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          PUBLIC_SUPABASE_URL: "http://localhost:54321"
          PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0"
          PUBLIC_API_URL: "http://localhost:5000"

      - name: Serve frontend
        run: npx serve dist -l 4321 &
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E tests
        run: npx playwright test --config playwright.e2e.config.ts
        working-directory: frontend
        env:
          SUPABASE_URL: "http://localhost:54321"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU"
