name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: kalandra
          POSTGRES_PASSWORD: kalandra_dev
          POSTGRES_DB: kalandra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kalandra"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Build backend
        run: dotnet build -c Release
        working-directory: backend

      - name: Start backend
        run: |
          cd backend/src/Kalandra.Api
          dotnet run -c Release --no-build --urls http://localhost:5000 &
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=kalandra;Username=kalandra;Password=kalandra_dev"
          Auth__SupabaseProjectUrl: "http://127.0.0.1:54321"
          Auth__SupabaseJwtSecret: "super-secret-jwt-token-with-at-least-32-characters-long"
          Auth__AdminUserIds__0: "admin-user-id"
          ASPNETCORE_ENVIRONMENT: Development

      - name: Wait for backend
        uses: KaliCZ/verify-deployment@v1
        with:
          health-url: http://localhost:5000/api/health
          max-attempts: 30
          retry-interval: 2

      - name: Verify JWT authentication works end-to-end
        run: |
          SRK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU"
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0"

          # Create a debug test user
          echo "Creating debug user..."
          CREATE_RESP=$(curl -s -X POST "http://127.0.0.1:54321/auth/v1/admin/users" \
            -H "Authorization: Bearer $SRK" \
            -H "apikey: $SRK" \
            -H "Content-Type: application/json" \
            -d '{"email":"jwt-debug@test.local","password":"debug-password-123","email_confirm":true}')
          echo "Create user response: $CREATE_RESP"

          # Sign in to get JWT
          echo "Signing in..."
          SIGNIN_RESP=$(curl -s -X POST "http://127.0.0.1:54321/auth/v1/token?grant_type=password" \
            -H "apikey: $ANON" \
            -H "Content-Type: application/json" \
            -d '{"email":"jwt-debug@test.local","password":"debug-password-123"}')
          echo "Sign-in response (truncated): ${SIGNIN_RESP:0:200}..."

          TOKEN=$(echo "$SIGNIN_RESP" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("access_token",""))' 2>/dev/null || echo "")
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Failed to get access token"
            exit 1
          fi
          echo "Got token (first 40 chars): ${TOKEN:0:40}..."

          # Decode JWT payload to verify issuer
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2)
          # Fix base64 padding
          PADDED="${PAYLOAD}$(printf '%0.s=' $((4 - ${#PAYLOAD} % 4)))"
          echo "JWT payload:"
          echo "$PADDED" | base64 -d 2>/dev/null | python3 -m json.tool || echo "(could not decode)"

          # Call the API with the JWT
          echo "Calling API..."
          API_STATUS=$(curl -s -o /tmp/api-response.json -w "%{http_code}" -X POST "http://localhost:5000/api/job-offers" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"companyName":"JWT Debug Corp","contactName":"Debug User","contactEmail":"debug@test.local","jobTitle":"Debug Engineer","description":"JWT debug test to verify authentication"}')
          echo "API response status: $API_STATUS"
          echo "API response body:" && cat /tmp/api-response.json || true

          if [ "$API_STATUS" != "201" ]; then
            echo "ERROR: API rejected JWT! Expected 201 but got $API_STATUS"
            exit 1
          fi
          echo "JWT authentication verified successfully."

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0"
          PUBLIC_API_URL: "http://localhost:5000"

      - name: Serve frontend
        run: npx serve dist -l 4321 &
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E tests
        run: npx playwright test --config playwright.e2e.config.ts
        working-directory: frontend
        env:
          SUPABASE_URL: "http://127.0.0.1:54321"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU"

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
