name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: kalandra
          POSTGRES_PASSWORD: kalandra_dev
          POSTGRES_DB: kalandra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kalandra"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Extract Supabase credentials
        run: |
          eval "$(supabase status -o env)"
          echo "SB_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SB_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV
          echo "SB_JWT_SECRET=$JWT_SECRET" >> $GITHUB_ENV
          echo "Anon key (first 30 chars): ${ANON_KEY:0:30}..."
          echo "JWT secret (first 30 chars): ${JWT_SECRET:0:30}..."

      - name: Build backend
        run: dotnet build -c Release
        working-directory: backend

      - name: Start backend
        run: |
          cd backend/src/Kalandra.Api
          dotnet run -c Release --no-build --urls http://localhost:5000 &
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=kalandra;Username=kalandra;Password=kalandra_dev"
          Auth__SupabaseProjectUrl: "http://127.0.0.1:54321"
          Auth__SupabaseJwtSecret: ${{ env.SB_JWT_SECRET }}
          Auth__AdminUserIds__0: "admin-user-id"
          ASPNETCORE_ENVIRONMENT: Development

      - name: Wait for backend
        uses: KaliCZ/verify-deployment@v1
        with:
          health-url: http://localhost:5000/api/health
          max-attempts: 30
          retry-interval: 2

      - name: Verify API accepts Supabase JWTs
        run: |
          # Create test user
          curl -sf -X POST "http://127.0.0.1:54321/auth/v1/admin/users" \
            -H "Authorization: Bearer $SB_SERVICE_ROLE_KEY" \
            -H "apikey: $SB_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"email":"jwt-check@test.local","password":"check-password-123","email_confirm":true}' > /dev/null

          # Sign in to get JWT
          SIGNIN=$(curl -sf -X POST "http://127.0.0.1:54321/auth/v1/token?grant_type=password" \
            -H "apikey: $SB_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{"email":"jwt-check@test.local","password":"check-password-123"}')
          TOKEN=$(echo "$SIGNIN" | python3 -c 'import sys,json; print(json.load(sys.stdin)["access_token"])')

          # Decode JWT header and payload
          echo "=== JWT Header ==="
          echo "$TOKEN" | cut -d. -f1 | (base64 -d 2>/dev/null || base64 -D 2>/dev/null) | python3 -m json.tool
          echo "=== JWT Payload ==="
          echo "$TOKEN" | cut -d. -f2 | (base64 -d 2>/dev/null || base64 -D 2>/dev/null) | python3 -m json.tool 2>/dev/null || echo "(padding issue, trying with padding)"
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2)
          echo "${PAYLOAD}==" | base64 -d 2>/dev/null | python3 -m json.tool || true

          # Call API with verbose output to see WWW-Authenticate header
          echo "=== API call with JWT ==="
          curl -v -X POST "http://localhost:5000/api/job-offers" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"companyName":"Check Corp","contactName":"Check","contactEmail":"c@c.com","jobTitle":"Check","description":"JWT check"}' \
            2>&1 || true

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          PUBLIC_SUPABASE_ANON_KEY: ${{ env.SB_ANON_KEY }}
          PUBLIC_API_URL: "http://localhost:5000"

      - name: Serve frontend
        run: npx serve dist -l 4321 &
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E tests
        run: npx playwright test --config playwright.e2e.config.ts
        working-directory: frontend
        env:
          SUPABASE_URL: "http://127.0.0.1:54321"
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SB_SERVICE_ROLE_KEY }}

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
