name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_backend_deploy:
        description: 'Skip the backend deploy (use to ship frontend when backend is broken)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}


permissions:
  contents: read
  packages: write
  deployments: write

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
              - 'infra/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'

  e2e:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Local Supabase always generates the same deterministic keys from its JWT secret.
    # Hardcoding them avoids waiting for 'supabase status' before building.
    env:
      SB_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SB_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: kalandra
          POSTGRES_PASSWORD: kalandra_dev
          POSTGRES_DB: kalandra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kalandra"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      # Start Supabase first in background — it pulls Docker images (~50s)
      # which overlaps with .NET/Node setup, backend build, and npm ci below.
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase in background
        run: supabase start --exclude realtime,imgproxy,edge-runtime,logflare,vector,supavisor &

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build backend
        run: dotnet build backend/src/Kalandra.Api -c Release

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ env.SB_ANON_KEY }}
          PUBLIC_API_URL: "http://localhost:5000"

      - name: Serve frontend
        run: npm run serve &
        working-directory: frontend

      # Wait for Supabase before starting the backend (which needs it running).
      # By now ~40s of setup/build work has overlapped with the ~50s startup.
      - name: Wait for Supabase
        run: |
          echo "Waiting for Supabase to be ready..."
          until supabase status > /dev/null 2>&1; do
            echo "Still waiting..."
            sleep 3
          done
          echo "Supabase is ready."

      - name: Start backend
        run: |
          dotnet run --project backend/src/Kalandra.Api -c Release --no-build --urls http://localhost:5000 &
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=kalandra;Username=kalandra;Password=kalandra_dev"
          Supabase__ProjectUrl: "http://127.0.0.1:54321"
          Turnstile__SecretKey: "1x0000000000000000000000000000000AA"
          ASPNETCORE_ENVIRONMENT: Development

      - name: Wait for backend
        uses: KaliCZ/verify-deployment@57cf981c4f0d8c4096fcba5308521e85f204da11  # v1
        with:
          health-url: http://localhost:5000/health
          max-attempts: 30
          retry-interval: 2

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> $GITHUB_OUTPUT
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: ./node_modules/.bin/playwright install --with-deps chromium
        working-directory: frontend


      - name: Run E2E tests
        run: ./node_modules/.bin/playwright test --config playwright.e2e.config.ts
        working-directory: frontend
        env:
          SUPABASE_URL: "http://127.0.0.1:54321"
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SB_SERVICE_ROLE_KEY }}

      - name: Upload Playwright traces
        if: '!cancelled()'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

  backend-test:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

  frontend-format:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Check formatting
        run: npm run format:check
        working-directory: frontend

  frontend-test:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> $GITHUB_OUTPUT
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: ./node_modules/.bin/playwright install --with-deps chromium
        working-directory: frontend


      - name: Run Playwright tests (pages only — e2e requires backend)
        run: ./node_modules/.bin/playwright test tests/pages.spec.ts
        working-directory: frontend

  backend-deploy:
    needs: [changes, e2e, backend-test, frontend-format, frontend-test]
    if: |
      always() &&
      (
        (
          github.event_name == 'push' &&
          needs.changes.outputs.backend == 'true' &&
          needs.e2e.result == 'success' &&
          needs.backend-test.result == 'success' &&
          needs.frontend-format.result == 'success' &&
          needs.frontend-test.result == 'success'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.skip_backend_deploy != true
        )
      )
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ vars.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/src/Kalandra.Api/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync Quadlet unit files to VM
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345  # v1.0.0
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "infra/quadlet/*.container,infra/quadlet/*.volume"
          target: "/home/${{ vars.OCI_USERNAME }}/.config/containers/systemd/"
          strip_components: 2

      - name: Deploy to Oracle Cloud (blue-green)
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          SUPABASE_PROJECT_URL: ${{ vars.SUPABASE_PROJECT_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          BETTERSTACK_SOURCE_TOKEN: ${{ secrets.BETTERSTACK_BACKEND_SOURCETOKEN }}
          SENTRY_DSN: ${{ secrets.PUBLIC_SENTRY_DSN }}
          IMAGE: ${{ env.REGISTRY }}/${{ vars.IMAGE_NAME }}:latest
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: DB_CONNECTION_STRING,SUPABASE_PROJECT_URL,SUPABASE_SERVICE_ROLE_KEY,TURNSTILE_SECRET_KEY,BETTERSTACK_SOURCE_TOKEN,SENTRY_DSN,IMAGE
          script: |
            set -euo pipefail
            MAX_ATTEMPTS=40

            # ----- 0. Idempotent host bootstrap -----

            # Linger keeps the user systemd instance alive across logouts
            # and reboots. No-op if already enabled.
            sudo loginctl enable-linger "$USER"

            # Allow rootless containers to bind ports 80/443 (needed for
            # Caddy). Idempotent — only writes the sysctl file if missing.
            if [ ! -f /etc/sysctl.d/99-unprivileged-ports.conf ]; then
              echo 'net.ipv4.ip_unprivileged_port_start=80' \
                | sudo tee /etc/sysctl.d/99-unprivileged-ports.conf > /dev/null
              sudo sysctl --system > /dev/null
            fi

            # Pick up any new/updated Quadlet files synced in the previous
            # workflow step.
            systemctl --user daemon-reload

            # Refresh the secrets env file. Rewritten on every deploy so
            # rotated secrets propagate the next time a slot starts.
            umask 077
            cat > "$HOME/kalandra-api.env" << EOF
            ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
            Supabase__ProjectUrl=${SUPABASE_PROJECT_URL}
            Turnstile__SecretKey=${TURNSTILE_SECRET_KEY}
            BetterStack__SourceToken=${BETTERSTACK_SOURCE_TOKEN}
            Sentry__Dsn=${SENTRY_DSN}
            EOF

            # Seed an initial Caddyfile if none exists, so the rootless
            # caddy.service has something to bind-mount on its first start.
            # The slot-swap step below overwrites this with the actual
            # active port and reloads Caddy.
            if [ ! -f "$HOME/Caddyfile" ]; then
              cat > "$HOME/Caddyfile" << 'EOF'
            api.kalandra.tech {
                reverse_proxy localhost:8080
                tls /etc/caddy/certs/origin.pem /etc/caddy/certs/origin-key.pem
            }
            EOF
            fi

            # Ensure Caddy is running. No-op if already started.
            # Quadlet-generated units cannot be `enable`d (systemd refuses
            # generated units), so we use `start`. Boot autostart is handled
            # by [Install] WantedBy=default.target inside the .container file.
            systemctl --user start caddy.service

            # ----- 1. Pull the new image -----
            podman pull "$IMAGE"

            # ----- 2. Determine which slot is currently active -----
            # The active slot is whichever systemd unit is currently running.
            # If neither is running (cold start) we default to blue.
            if systemctl --user is-active --quiet kalandra-api-blue.service; then
              OLD=blue; NEW=green; NEW_PORT=8081
            elif systemctl --user is-active --quiet kalandra-api-green.service; then
              OLD=green; NEW=blue; NEW_PORT=8080
            else
              OLD=""; NEW=blue; NEW_PORT=8080
            fi
            echo "Active: ${OLD:-<none>} → Deploying: $NEW on port $NEW_PORT"

            # ----- 3. Start the new slot -----
            # The Quadlet-generated service does `podman run --rm`, so each
            # start creates a fresh container from the (just-pulled) image.
            # Quadlet units cannot be `enable`d — boot autostart comes from
            # [Install] WantedBy=default.target in the .container file.
            systemctl --user start "kalandra-api-${NEW}.service"

            # ----- 4. Health check the new slot directly (bypassing Caddy) -----
            echo "Waiting for new slot on port $NEW_PORT..."
            ATTEMPTS=0
            until curl -sf "http://localhost:${NEW_PORT}/health" > /dev/null 2>&1; do
              ATTEMPTS=$((ATTEMPTS + 1))
              if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                echo "New slot failed to start. Container logs:"
                podman logs "kalandra-api-${NEW}" 2>&1 || true
                echo "systemd status:"
                systemctl --user status "kalandra-api-${NEW}.service" --no-pager || true
                echo "Rolling back..."
                systemctl --user stop "kalandra-api-${NEW}.service" || true
                exit 1
              fi
              echo "Attempt $ATTEMPTS/$MAX_ATTEMPTS — waiting 3s..."
              sleep 3
            done
            echo "New slot is healthy on port $NEW_PORT."

            # ----- 5. Swap Caddy upstream to the new port -----
            # Caddy runs as a rootless Quadlet container under the opc
            # user, so the bind-mounted Caddyfile is read with the same
            # SELinux label opc owns it with — no chcon needed.
            cat > "$HOME/Caddyfile" << EOF
            api.kalandra.tech {
                reverse_proxy localhost:${NEW_PORT}
                tls /etc/caddy/certs/origin.pem /etc/caddy/certs/origin-key.pem
            }
            EOF
            podman exec caddy caddy reload --config /etc/caddy/Caddyfile

            # ----- 6. Stop the old slot -----
            # Quadlet units can't be `disable`d, so we just stop. Both slot
            # .container files have WantedBy=default.target, which means a
            # cold reboot will start whichever one Quadlet enumerates first;
            # the next deploy re-establishes the intended slot.
            if [ -n "$OLD" ]; then
              systemctl --user stop "kalandra-api-${OLD}.service" || true
            fi

            echo "Deployment complete — kalandra-api-${NEW} serving on port ${NEW_PORT}."

      - name: Verify public endpoint
        uses: KaliCZ/verify-deployment@57cf981c4f0d8c4096fcba5308521e85f204da11  # v1
        with:
          health-url: https://api.kalandra.tech/health
          max-attempts: 20
          retry-interval: 5
          expected-content: ${{ github.sha }}

  frontend-deploy:
    needs: [changes, e2e, backend-test, frontend-format, frontend-test, backend-deploy]
    if: |
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'push' &&
          needs.changes.outputs.frontend == 'true' &&
          needs.e2e.result == 'success' &&
          needs.backend-test.result == 'success' &&
          needs.frontend-format.result == 'success' &&
          needs.frontend-test.result == 'success' &&
          (needs.backend-deploy.result == 'success' || needs.backend-deploy.result == 'skipped')
        )
      )
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history required for git-based sitemap lastmod in astro.config.mjs
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_PROJECT_URL }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
          PUBLIC_API_URL: https://api.kalandra.tech
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          PUBLIC_SENTRY_DSN: ${{ secrets.PUBLIC_SENTRY_DSN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=kalandra-tech
