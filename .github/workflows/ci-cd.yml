name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}


permissions:
  contents: read
  packages: write
  deployments: write

env:
  REGISTRY: ghcr.io

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Local Supabase always generates the same deterministic keys from its JWT secret.
    # Hardcoding them avoids waiting for 'supabase status' before building.
    env:
      SB_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SB_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: kalandra
          POSTGRES_PASSWORD: kalandra_dev
          POSTGRES_DB: kalandra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kalandra"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      # Start Supabase first in background — it pulls Docker images (~50s)
      # which overlaps with .NET/Node setup, backend build, and npm ci below.
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase in background
        run: supabase start --exclude realtime,imgproxy,edge-runtime,logflare,vector,supavisor &

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build backend
        run: dotnet build backend/src/Kalandra.Api -c Release

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ env.SB_ANON_KEY }}
          PUBLIC_API_URL: "http://localhost:5000"

      - name: Serve frontend
        run: npm run serve &
        working-directory: frontend

      # Wait for Supabase before starting the backend (which needs it running).
      # By now ~40s of setup/build work has overlapped with the ~50s startup.
      - name: Wait for Supabase
        run: |
          echo "Waiting for Supabase to be ready..."
          until supabase status > /dev/null 2>&1; do
            echo "Still waiting..."
            sleep 3
          done
          echo "Supabase is ready."

      - name: Start backend
        run: |
          dotnet run --project backend/src/Kalandra.Api -c Release --no-build --urls http://localhost:5000 &
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=kalandra;Username=kalandra;Password=kalandra_dev"
          Auth__SupabaseProjectUrl: "http://127.0.0.1:54321"
          Storage__SupabaseProjectUrl: "http://127.0.0.1:54321"
          Storage__ServiceKey: ${{ env.SB_SERVICE_ROLE_KEY }}
          Turnstile__SecretKey: "1x0000000000000000000000000000000AA"
          ASPNETCORE_ENVIRONMENT: Development

      - name: Wait for backend
        uses: KaliCZ/verify-deployment@v1
        with:
          health-url: http://localhost:5000/health
          max-attempts: 30
          retry-interval: 2

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> $GITHUB_OUTPUT
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: ./node_modules/.bin/playwright install --with-deps chromium
        working-directory: frontend


      - name: Run E2E tests
        run: ./node_modules/.bin/playwright test --config playwright.e2e.config.ts
        working-directory: frontend
        env:
          SUPABASE_URL: "http://127.0.0.1:54321"
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SB_SERVICE_ROLE_KEY }}

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> $GITHUB_OUTPUT
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: ./node_modules/.bin/playwright install --with-deps chromium
        working-directory: frontend


      - name: Run Playwright tests (pages only — e2e requires backend)
        run: ./node_modules/.bin/playwright test tests/pages.spec.ts
        working-directory: frontend

  backend-deploy:
    needs: [e2e, backend-test, frontend-test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ vars.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/src/Kalandra.Api/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      - name: Deploy to Oracle Cloud (blue-green)
        uses: appleboy/ssh-action@v1
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          SUPABASE_PROJECT_URL: ${{ vars.SUPABASE_PROJECT_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          IMAGE: ${{ env.REGISTRY }}/${{ vars.IMAGE_NAME }}:latest
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: DB_CONNECTION_STRING,SUPABASE_PROJECT_URL,SUPABASE_SERVICE_ROLE_KEY,TURNSTILE_SECRET_KEY,IMAGE
          script: |
            set -euo pipefail
            MAX_ATTEMPTS=40

            # ----- 1. Refresh secrets file used by both Quadlet units -----
            # Rewritten on every deploy so rotated secrets are picked up the
            # next time the unit starts. Mode 600 — readable only by opc.
            umask 077
            cat > "$HOME/kalandra-api.env" << EOF
            ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
            Auth__SupabaseProjectUrl=${SUPABASE_PROJECT_URL}
            Storage__SupabaseProjectUrl=${SUPABASE_PROJECT_URL}
            Storage__ServiceKey=${SUPABASE_SERVICE_ROLE_KEY}
            Turnstile__SecretKey=${TURNSTILE_SECRET_KEY}
            EOF

            # ----- 2. Pull the new image -----
            podman pull "$IMAGE"

            # ----- 3. Determine which slot is currently active -----
            # The active slot is whichever systemd unit is currently running.
            # If neither is running (cold start) we default to blue.
            if systemctl --user is-active --quiet kalandra-api-blue.service; then
              OLD=blue; NEW=green; NEW_PORT=8081
            elif systemctl --user is-active --quiet kalandra-api-green.service; then
              OLD=green; NEW=blue; NEW_PORT=8080
            else
              OLD=""; NEW=blue; NEW_PORT=8080
            fi
            echo "Active: ${OLD:-<none>} → Deploying: $NEW on port $NEW_PORT"

            # ----- 4. Start the new slot -----
            # `enable --now` makes it autostart on boot AND starts it now.
            # The Quadlet-generated service does `podman run --rm`, so each
            # start creates a fresh container from the (just-pulled) image.
            systemctl --user enable --now "kalandra-api-${NEW}.service"

            # ----- 5. Health check the new slot directly (bypassing Caddy) -----
            echo "Waiting for new slot on port $NEW_PORT..."
            ATTEMPTS=0
            until curl -sf "http://localhost:${NEW_PORT}/health" > /dev/null 2>&1; do
              ATTEMPTS=$((ATTEMPTS + 1))
              if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                echo "New slot failed to start. Container logs:"
                podman logs "kalandra-api-${NEW}" 2>&1 || true
                echo "systemd status:"
                systemctl --user status "kalandra-api-${NEW}.service" --no-pager || true
                echo "Rolling back..."
                systemctl --user disable --now "kalandra-api-${NEW}.service" || true
                exit 1
              fi
              echo "Attempt $ATTEMPTS/$MAX_ATTEMPTS — waiting 3s..."
              sleep 3
            done
            echo "New slot is healthy on port $NEW_PORT."

            # ----- 6. Swap Caddy upstream to the new port -----
            # Caddy runs rootful (sudo docker) because it binds 80/443 and
            # mounts the Cloudflare Origin Certificate. The Caddyfile is
            # owned by opc but read by the rootful container, so we relabel
            # it for SELinux on each rewrite.
            cat > "$HOME/Caddyfile" << EOF
            api.kalandra.tech {
                reverse_proxy localhost:${NEW_PORT}
                tls /etc/caddy/certs/origin.pem /etc/caddy/certs/origin-key.pem
            }
            EOF
            chcon -t container_file_t "$HOME/Caddyfile"
            sudo docker exec caddy caddy reload --config /etc/caddy/Caddyfile

            # ----- 7. Stop and disable the old slot -----
            # Disable so it does not autostart on the next boot — only the
            # currently-active slot should come up. This prevents the old
            # container from running background jobs alongside the new one.
            if [ -n "$OLD" ]; then
              systemctl --user disable --now "kalandra-api-${OLD}.service" || true
            fi

            echo "Deployment complete — kalandra-api-${NEW} serving on port ${NEW_PORT}."

      - name: Verify public endpoint
        uses: KaliCZ/verify-deployment@v1
        with:
          health-url: https://api.kalandra.tech/health
          max-attempts: 20
          retry-interval: 5
          expected-content: ${{ github.sha }}

  frontend-deploy:
    needs: backend-deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_PROJECT_URL }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
          PUBLIC_API_URL: https://api.kalandra.tech
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=kalandra-tech
