name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_backend_deploy:
        description: 'Skip the backend deploy (use to ship frontend when backend is broken)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}


permissions:
  contents: read
  packages: write
  deployments: write

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
              - 'infra/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'

  e2e:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Local Supabase always generates the same deterministic keys from its JWT secret.
    # Hardcoding them avoids waiting for 'supabase status' before building.
    env:
      SB_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SB_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU

    steps:
      - uses: actions/checkout@v6

      # Start Supabase first in background — it pulls Docker images (~50s)
      # which overlaps with .NET/Node setup, backend build, and npm ci below.
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local Supabase in background
        run: supabase start --exclude realtime,imgproxy,edge-runtime,logflare,vector,supavisor &

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build backend
        run: dotnet build backend/src/Kalandra.Api -c Release

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ env.SB_ANON_KEY }}
          PUBLIC_API_URL: "http://localhost:5000"
          # Override the DSN committed in frontend/.env so the @sentry/browser chunk tree-shakes
          # out at build time and the e2e run produces zero Sentry traffic.
          PUBLIC_SENTRY_DSN: ""

      - name: Serve frontend
        run: npm run serve &
        working-directory: frontend

      # Wait for Supabase before starting the backend (which needs it running).
      # By now ~40s of setup/build work has overlapped with the ~50s startup.
      - name: Wait for Supabase
        run: |
          echo "Waiting for Supabase to be ready..."
          until supabase status > /dev/null 2>&1; do
            echo "Still waiting..."
            sleep 3
          done
          echo "Supabase is ready."

      - name: Start backend
        run: |
          dotnet run --project backend/src/Kalandra.Api -c Release --no-build --urls http://localhost:5000 &
        env:
          # ConnectionStrings__DefaultConnection comes from appsettings.json
          # (points at Supabase's bundled Postgres on :54322 — same as local dev).
          Supabase__ProjectUrl: "http://127.0.0.1:54321"
          Turnstile__SecretKey: "1x0000000000000000000000000000000AA"
          ASPNETCORE_ENVIRONMENT: Development

      - name: Wait for backend
        uses: KaliCZ/verify-deployment@57cf981c4f0d8c4096fcba5308521e85f204da11  # v1
        with:
          health-url: http://localhost:5000/health
          max-attempts: 30
          retry-interval: 2

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> $GITHUB_OUTPUT
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: ./node_modules/.bin/playwright install --with-deps chromium
        working-directory: frontend


      - name: Run E2E tests
        run: ./node_modules/.bin/playwright test --config playwright.e2e.config.ts
        working-directory: frontend
        env:
          SUPABASE_URL: "http://127.0.0.1:54321"
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SB_SERVICE_ROLE_KEY }}

      - name: Upload Playwright traces
        if: '!cancelled()'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

  backend-test:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

  frontend-format:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Check formatting
        run: npm run format:check
        working-directory: frontend

  frontend-test:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          # Override the DSN committed in frontend/.env so the @sentry/browser chunk tree-shakes
          # out at build time and the page-test run produces zero Sentry traffic.
          PUBLIC_SENTRY_DSN: ""

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> $GITHUB_OUTPUT
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: ./node_modules/.bin/playwright install --with-deps chromium
        working-directory: frontend


      - name: Run Playwright tests (pages only — e2e requires backend)
        run: ./node_modules/.bin/playwright test tests/pages.spec.ts
        working-directory: frontend

  backend-deploy:
    needs: [changes, e2e, backend-test, frontend-format, frontend-test]
    if: |
      always() &&
      (
        (
          github.event_name == 'push' &&
          needs.changes.outputs.backend == 'true' &&
          needs.e2e.result == 'success' &&
          needs.backend-test.result == 'success' &&
          needs.frontend-format.result == 'success' &&
          needs.frontend-test.result == 'success'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.skip_backend_deploy != true
        )
      )
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ vars.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/src/Kalandra.Api/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync Compose file to VM
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345  # v1.0.0
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "infra/docker-compose.yml"
          target: "/home/${{ vars.OCI_USERNAME }}/"
          strip_components: 1

      - name: Deploy to Oracle Cloud (blue-green)
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          SUPABASE_PROJECT_URL: ${{ vars.SUPABASE_PROJECT_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          SENTRY_DSN: ${{ secrets.BACKEND_SENTRY_DSN }}
          # Digest-pinned, not :latest — the exact build verified by this run
          # is what runs and what comes back after a reboot.
          IMAGE_REF: ${{ env.REGISTRY }}/${{ vars.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          EXPECTED_SHA: ${{ github.sha }}
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: DB_CONNECTION_STRING,SUPABASE_PROJECT_URL,SUPABASE_SERVICE_ROLE_KEY,TURNSTILE_SECRET_KEY,SENTRY_DSN,IMAGE_REF,EXPECTED_SHA
          script: |
            set -euo pipefail
            MAX_ATTEMPTS=40
            COMPOSE="sudo docker compose -p kalandra -f $HOME/docker-compose.yml --env-file $HOME/compose.env"

            # ----- 0. Idempotent host bootstrap -----
            # Reboot survival is the Docker daemon's job: containers flagged
            # restart=unless-stopped are restarted on boot (except ones we
            # explicitly stopped). So we just make sure the daemon is enabled
            # — no linger, no user-systemd, no unprivileged-port sysctl
            # (rootful Docker binds 80/443 natively).
            sudo systemctl enable --now docker

            umask 077

            # Compose variable substitution (the digest-pinned image to run).
            echo "IMAGE_REF=$IMAGE_REF" > "$HOME/compose.env"

            # App secrets, read by both slots via env_file. Rewritten every
            # deploy so rotated secrets propagate when a slot is recreated.
            cat > "$HOME/kalandra-api.env" << EOF
            ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
            Supabase__ProjectUrl=${SUPABASE_PROJECT_URL}
            Supabase__ServiceKey=${SUPABASE_SERVICE_ROLE_KEY}
            Turnstile__SecretKey=${TURNSTILE_SECRET_KEY}
            Sentry__Dsn=${SENTRY_DSN}
            EOF

            # Seed an initial Caddyfile if none exists so Caddy has something
            # to bind-mount on its first start. The slot-swap step below
            # rewrites it with the active port and reloads Caddy.
            if [ ! -f "$HOME/Caddyfile" ]; then
              cat > "$HOME/Caddyfile" << 'EOF'
            api.kalandra.tech {
                reverse_proxy localhost:8080
                tls /etc/caddy/certs/origin.pem /etc/caddy/certs/origin-key.pem
            }
            EOF
            fi

            # ----- 1. Pull the digest-pinned image -----
            sudo docker pull "$IMAGE_REF"

            # ----- 2. Ensure Caddy is up (idempotent) -----
            $COMPOSE up -d caddy

            # ----- 3. Determine which slot is currently active -----
            # Active = whichever API slot is running now. Cold start → blue.
            if sudo docker ps --filter name=kalandra-api-blue --filter status=running --format '{{.Names}}' | grep -q .; then
              OLD=blue; NEW=green; NEW_PORT=8081
            elif sudo docker ps --filter name=kalandra-api-green --filter status=running --format '{{.Names}}' | grep -q .; then
              OLD=green; NEW=blue; NEW_PORT=8080
            else
              OLD=""; NEW=blue; NEW_PORT=8080
            fi
            echo "Active: ${OLD:-<none>} → Deploying: $NEW on port $NEW_PORT"

            # ----- 4. Start the new slot -----
            # IMAGE_REF changed (new digest), so `up -d` recreates the slot
            # from the just-pulled image and (re)applies restart=unless-stopped.
            $COMPOSE up -d "kalandra-api-${NEW}"

            # ----- 5. Health check the new slot directly (bypassing Caddy) -----
            # Match the deployed commit, not just any healthy response, so a
            # stale container from an earlier deploy can't pass this gate.
            echo "Waiting for new slot on port $NEW_PORT (expecting commit $EXPECTED_SHA)..."
            ATTEMPTS=0
            until curl -sf "http://localhost:${NEW_PORT}/health" 2>/dev/null | grep -qF "$EXPECTED_SHA"; do
              ATTEMPTS=$((ATTEMPTS + 1))
              if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                echo "New slot failed to start. Container logs:"
                sudo docker logs "kalandra-api-${NEW}" 2>&1 | tail -50 || true
                echo "Rolling back..."
                $COMPOSE stop "kalandra-api-${NEW}" || true
                exit 1
              fi
              echo "Attempt $ATTEMPTS/$MAX_ATTEMPTS — waiting 3s..."
              sleep 3
            done
            echo "New slot is healthy on port $NEW_PORT."

            # ----- 6. Swap Caddy upstream to the new port -----
            cat > "$HOME/Caddyfile" << EOF
            api.kalandra.tech {
                reverse_proxy localhost:${NEW_PORT}
                tls /etc/caddy/certs/origin.pem /etc/caddy/certs/origin-key.pem
            }
            EOF
            sudo docker exec caddy caddy reload --config /etc/caddy/Caddyfile

            # ----- 7. Stop the old slot -----
            # `docker stop` marks it explicitly stopped, so restart=unless-stopped
            # will NOT bring it back on reboot — only the active slot returns.
            if [ -n "$OLD" ]; then
              $COMPOSE stop "kalandra-api-${OLD}" || true
            fi

            # ----- 8. Prune images no longer referenced by any container -----
            # The running slot, the stopped previous slot, and Caddy keep
            # their images; older digests are removed so the boot disk doesn't
            # grow with every deploy. (Images are only ever created by deploys.)
            sudo docker image prune -af

            echo "Deployment complete — kalandra-api-${NEW} serving on port ${NEW_PORT}."

      - name: Verify public endpoint
        uses: KaliCZ/verify-deployment@57cf981c4f0d8c4096fcba5308521e85f204da11  # v1
        with:
          health-url: https://api.kalandra.tech/health
          max-attempts: 20
          retry-interval: 5
          expected-content: ${{ github.sha }}

  frontend-deploy:
    needs: [changes, e2e, backend-test, frontend-format, frontend-test, backend-deploy]
    if: |
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'push' &&
          needs.changes.outputs.frontend == 'true' &&
          needs.e2e.result == 'success' &&
          needs.backend-test.result == 'success' &&
          needs.frontend-format.result == 'success' &&
          needs.frontend-test.result == 'success' &&
          (needs.backend-deploy.result == 'success' || needs.backend-deploy.result == 'skipped')
        )
      )
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history required for git-based sitemap lastmod in astro.config.mjs
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_PROJECT_URL }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
          PUBLIC_API_URL: https://api.kalandra.tech
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          # @sentry/vite-plugin uploads source maps + tags the release with the deploy commit so
          # Sentry resolves prod stack traces to original source. Omitting the token silently
          # skips the upload (see astro.config.mjs). The plugin reads SENTRY_AUTH_TOKEN by name;
          # the org auth token lives in the SENTRY_CI_TOKEN secret.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_CI_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=kalandra-tech
