name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_backend_deploy:
        description: 'Skip the backend deploy (use to ship frontend when backend is broken)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}


permissions:
  contents: read
  packages: write
  deployments: write

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
              - 'infra/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'

  e2e:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Local Supabase always generates the same deterministic keys from its JWT secret.
    # Hardcoding them avoids waiting for 'supabase status' before building.
    env:
      SB_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SB_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU

    steps:
      - uses: actions/checkout@v7

      # Start Supabase first in background — it pulls Docker images (~50s)
      # which overlaps with .NET/Node setup, backend build, and npm ci below.
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          # Exact pin (matching package.json) — resolving "latest" is a GitHub API
          # call that rate-limits on shared runners.
          version: 2.108.0

      - name: Start local Supabase in background
        run: supabase start --exclude realtime,imgproxy,edge-runtime,logflare,vector,supavisor &

      # The API hosts a Temporal worker and needs the server at startup; the dev
      # server boots in seconds while the .NET/Node setup below overlaps.
      - name: Start Temporal dev server
        run: docker run -d --name temporal-dev -p 7233:7233 temporalio/temporal:1.7.2 server start-dev --ip 0.0.0.0 --headless

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build backend
        run: dotnet build backend/src/Kalandra.Api -c Release

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ env.SB_ANON_KEY }}
          PUBLIC_API_URL: "http://localhost:5000"
          # Override the DSN committed in frontend/.env so the @sentry/browser chunk tree-shakes
          # out at build time and the e2e run produces zero Sentry traffic.
          PUBLIC_SENTRY_DSN: ""

      - name: Serve frontend
        run: npm run serve &
        working-directory: frontend

      # Wait for Supabase before starting the backend (which needs it running).
      # By now ~40s of setup/build work has overlapped with the ~50s startup.
      - name: Wait for Supabase
        run: |
          echo "Waiting for Supabase to be ready..."
          until supabase status > /dev/null 2>&1; do
            echo "Still waiting..."
            sleep 3
          done
          echo "Supabase is ready."

      - name: Start backend
        run: |
          dotnet run --project backend/src/Kalandra.Api -c Release --no-build --urls http://localhost:5000 &
        env:
          # ConnectionStrings__DefaultConnection comes from appsettings.json
          # (points at Supabase's bundled Postgres on :54322 — same as local dev).
          Supabase__ProjectUrl: "http://127.0.0.1:54321"
          Turnstile__SecretKey: "1x0000000000000000000000000000000AA"
          ASPNETCORE_ENVIRONMENT: Development

      - name: Wait for backend
        uses: KaliCZ/verify-deployment@57cf981c4f0d8c4096fcba5308521e85f204da11  # v1
        with:
          health-url: http://localhost:5000/health
          max-attempts: 30
          retry-interval: 2

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> $GITHUB_OUTPUT
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: ./node_modules/.bin/playwright install --with-deps chromium
        working-directory: frontend


      - name: Run E2E tests
        run: ./node_modules/.bin/playwright test --config playwright.e2e.config.ts
        working-directory: frontend
        env:
          SUPABASE_URL: "http://127.0.0.1:54321"
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SB_SERVICE_ROLE_KEY }}

      - name: Upload Playwright traces
        if: '!cancelled()'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

  backend-test:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

  frontend-format:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Check formatting
        run: npm run format:check
        working-directory: frontend

  frontend-test:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          # Override the DSN committed in frontend/.env so the @sentry/browser chunk tree-shakes
          # out at build time and the page-test run produces zero Sentry traffic.
          PUBLIC_SENTRY_DSN: ""

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> $GITHUB_OUTPUT
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: ./node_modules/.bin/playwright install --with-deps chromium
        working-directory: frontend


      - name: Run Playwright tests (pages only — e2e requires backend)
        run: ./node_modules/.bin/playwright test tests/pages.spec.ts
        working-directory: frontend

  backend-deploy:
    needs: [changes, e2e, backend-test, frontend-format, frontend-test]
    if: |
      always() &&
      (
        (
          github.event_name == 'push' &&
          needs.changes.outputs.backend == 'true' &&
          needs.e2e.result == 'success' &&
          needs.backend-test.result == 'success' &&
          needs.frontend-format.result == 'success' &&
          needs.frontend-test.result == 'success'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.skip_backend_deploy != true
        )
      )
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ vars.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/src/Kalandra.Api/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync Quadlet unit files to VM
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345  # v1.0.0
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          # App slot units only (the shared Caddy units live under infra/host/,
          # host-managed per SETUP.md §3.3). Land them in this app's staging dir
          # under ~/demoPage/ (parallel to ~/hampap/ on the shared box); the
          # deploy installs only the slot it's deploying to, leaving the other
          # slot's live unit (and its pinned production image) untouched.
          source: "infra/quadlet/*.container"
          target: "/home/${{ vars.OCI_USERNAME }}/demoPage/quadlet-staging/"
          strip_components: 2

      - name: Sync Caddy routing fragment to VM
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345  # v1.0.0
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          # Kalandra's routing template (port filled in at deploy time). The
          # shared Caddy that loads it is host infra, not synced here.
          source: "infra/quadlet/kalandra.caddy"
          target: "/home/${{ vars.OCI_USERNAME }}/demoPage/"
          strip_components: 2

      - name: Deploy to Oracle Cloud (blue-green)
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          SUPABASE_PROJECT_URL: ${{ vars.SUPABASE_PROJECT_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          SENTRY_DSN: ${{ secrets.BACKEND_SENTRY_DSN }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ vars.SMTP_FROM_EMAIL }}
          BLOG_AUTHOR_NOTIFICATION_EMAIL: ${{ vars.BLOG_AUTHOR_NOTIFICATION_EMAIL }}
          JOB_OFFERS_OWNER_NOTIFICATION_EMAIL: ${{ vars.JOB_OFFERS_OWNER_NOTIFICATION_EMAIL }}
          # Digest-pinned, not :latest — the exact build verified by this run
          # is what runs and what comes back after a reboot.
          IMAGE_REF: ${{ env.REGISTRY }}/${{ vars.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          EXPECTED_SHA: ${{ github.sha }}
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: DB_CONNECTION_STRING,SUPABASE_PROJECT_URL,SUPABASE_SERVICE_ROLE_KEY,TURNSTILE_SECRET_KEY,SENTRY_DSN,SMTP_HOST,SMTP_PORT,SMTP_USERNAME,SMTP_PASSWORD,SMTP_FROM_EMAIL,BLOG_AUTHOR_NOTIFICATION_EMAIL,JOB_OFFERS_OWNER_NOTIFICATION_EMAIL,IMAGE_REF,EXPECTED_SHA
          script: |
            set -euo pipefail
            MAX_ATTEMPTS=40
            UNIT_DIR="$HOME/.config/containers/systemd"
            APP_DIR="$HOME/demoPage"
            STAGING="$APP_DIR/quadlet-staging"
            SITE_CONF=/srv/caddy/sites/kalandra.caddy

            # ----- 0. Preconditions: shared infra must already exist -----
            # podman and the shared Caddy proxy are host infrastructure,
            # provisioned once per machine (SETUP.md §3.2–3.3), not by this
            # deploy. Fail fast with a pointer if an assumption is unmet.
            command -v podman >/dev/null 2>&1 \
              || { echo "podman not installed — see SETUP.md §3.2 (host setup)"; exit 1; }
            podman ps --filter name=caddy --filter status=running --format '{{.Names}}' | grep -qx caddy \
              || { echo "Shared Caddy not running — see SETUP.md §3.3 (shared Caddy)"; exit 1; }
            [ -d /srv/caddy/sites ] \
              || { echo "/srv/caddy/sites missing — see SETUP.md §3.3 (shared Caddy)"; exit 1; }

            umask 077
            mkdir -p "$APP_DIR"

            # App secrets, read by both slots via EnvironmentFile. Rewritten
            # every deploy so rotated secrets propagate when a slot (re)starts.
            cat > "$APP_DIR/kalandra-api.env" << EOF
            ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
            Supabase__ProjectUrl=${SUPABASE_PROJECT_URL}
            Supabase__ServiceKey=${SUPABASE_SERVICE_ROLE_KEY}
            Turnstile__SecretKey=${TURNSTILE_SECRET_KEY}
            Sentry__Dsn=${SENTRY_DSN}
            Temporal__TargetHost=localhost:7233
            Email__Host=${SMTP_HOST}
            Email__Port=${SMTP_PORT}
            Email__Username=${SMTP_USERNAME}
            Email__Password=${SMTP_PASSWORD}
            Email__FromEmail=${SMTP_FROM_EMAIL}
            Email__FromName=kalandra.tech
            Blog__AuthorNotificationEmail=${BLOG_AUTHOR_NOTIFICATION_EMAIL}
            JobOffers__OwnerNotificationEmail=${JOB_OFFERS_OWNER_NOTIFICATION_EMAIL}
            EOF

            # ----- 1. Determine which slot is currently active -----
            # Active = whichever slot's service is running now. Cold start → blue.
            if systemctl --user is-active --quiet kalandra-api-blue.service; then
              OLD=blue; NEW=green; NEW_PORT=8081
            elif systemctl --user is-active --quiet kalandra-api-green.service; then
              OLD=green; NEW=blue; NEW_PORT=8080
            else
              OLD=""; NEW=blue; NEW_PORT=8080
            fi
            echo "Active: ${OLD:-<none>} → Deploying: $NEW on port $NEW_PORT"

            # ----- 2. Install + pin ONLY the slot we're deploying to -----
            # Copy just the new slot's unit from staging and pin its Image= to the
            # digest just built. The active slot's unit is deliberately left
            # untouched, so its pinned (production) image stays put — if the host
            # crashes or reboots mid-deploy, production comes back on the verified
            # build, not this unproven one. Promotion happens only at the Caddy
            # swap below. Digest, never :latest, so a restart can't drift.
            mkdir -p "$UNIT_DIR"
            cp "$STAGING/kalandra-api-${NEW}.container" "$UNIT_DIR/kalandra-api-${NEW}.container"
            sed -i "s|^Image=.*|Image=${IMAGE_REF}|" "$UNIT_DIR/kalandra-api-${NEW}.container"
            systemctl --user daemon-reload

            # ----- 3. Pull the digest-pinned image -----
            podman pull "$IMAGE_REF"

            # ----- 4. Start the new slot -----
            # Stop first: if the unit is already active from a prior deploy,
            # `start` is a no-op and the old container keeps serving the old
            # binary. Cycling forces a fresh container from the pinned image.
            systemctl --user stop "kalandra-api-${NEW}.service" || true
            systemctl --user start "kalandra-api-${NEW}.service"

            # ----- 5. Health check the new slot directly (bypassing Caddy) -----
            # Match the deployed commit, not just any healthy response, so a
            # stale container from an earlier deploy can't pass this gate.
            echo "Waiting for new slot on port $NEW_PORT (expecting commit $EXPECTED_SHA)..."
            ATTEMPTS=0
            until curl -sf "http://localhost:${NEW_PORT}/health" 2>/dev/null | grep -qF "$EXPECTED_SHA"; do
              ATTEMPTS=$((ATTEMPTS + 1))
              if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                echo "New slot failed to start. Container logs:"
                podman logs "kalandra-api-${NEW}" 2>&1 | tail -50 || true
                echo "systemd status:"
                systemctl --user status "kalandra-api-${NEW}.service" --no-pager || true
                echo "Rolling back..."
                systemctl --user stop "kalandra-api-${NEW}.service" || true
                exit 1
              fi
              echo "Attempt $ATTEMPTS/$MAX_ATTEMPTS — waiting 3s..."
              sleep 3
            done
            echo "New slot is healthy on port $NEW_PORT."

            # ----- 6. Point our site at the new port (promotion) and reload -----
            # We write ONLY our own fragment, /srv/caddy/sites/kalandra.caddy —
            # never the shared /srv/caddy/Caddyfile, which is set up once at host
            # provisioning and only `import`s each app's fragment. The reload
            # below points at that root config because that's how Caddy reloads
            # (it re-reads the root + all imports and applies gracefully); it does
            # not modify the file. This is the promotion step — until now Caddy
            # was still routing to the old (production) slot.
            sed "s/__PORT__/${NEW_PORT}/" "$APP_DIR/kalandra.caddy" > "$SITE_CONF"
            # Oracle Linux enforces SELinux; relabel the freshly-written fragment
            # so the Caddy container can read it (the unit's :z relabel only runs
            # at container start). opc owns the file, so no sudo. No-op where
            # SELinux/chcon isn't present.
            command -v chcon >/dev/null 2>&1 && chcon -t container_file_t "$SITE_CONF" || true
            podman exec caddy caddy reload --config /etc/caddy/Caddyfile

            # ----- 7. Retire the old slot -----
            # Stop it AND remove its unit file, so only the production slot's
            # unit remains on disk. Quadlet derives boot-start from the unit's
            # presence + WantedBy=default.target (generated units can't be
            # `systemctl disable`d), so removing the file is what guarantees a
            # cold reboot starts exactly one container — the one Caddy routes to.
            # The next deploy recreates this slot from staging (step 2), so
            # blue/green still alternates. Safe as the final step: until now the
            # old unit stayed on disk, so a crash/reboot mid-deploy still brings
            # production back on its verified, pinned image.
            if [ -n "$OLD" ]; then
              systemctl --user stop "kalandra-api-${OLD}.service" || true
              rm -f "$UNIT_DIR/kalandra-api-${OLD}.container"
              systemctl --user daemon-reload
            fi

            # ----- 8. Prune only THIS app's old images -----
            # The box is shared, so scope the prune to our ownership label (set
            # in the Dockerfile) — never touch other apps' images or the shared
            # Caddy image. The running slot still references its digest.
            podman image prune -af --filter "label=tech.kalandra.app=demopage"

            echo "Deployment complete — kalandra-api-${NEW} serving on port ${NEW_PORT}."

      - name: Verify public endpoint
        uses: KaliCZ/verify-deployment@57cf981c4f0d8c4096fcba5308521e85f204da11  # v1
        with:
          health-url: https://api.kalandra.tech/health
          max-attempts: 20
          retry-interval: 5
          expected-content: ${{ github.sha }}

  frontend-deploy:
    needs: [changes, e2e, backend-test, frontend-format, frontend-test, backend-deploy]
    if: |
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'push' &&
          needs.changes.outputs.frontend == 'true' &&
          needs.e2e.result == 'success' &&
          needs.backend-test.result == 'success' &&
          needs.frontend-format.result == 'success' &&
          needs.frontend-test.result == 'success' &&
          (needs.backend-deploy.result == 'success' || needs.backend-deploy.result == 'skipped')
        )
      )
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_PROJECT_URL }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
          PUBLIC_API_URL: https://api.kalandra.tech
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          # @sentry/vite-plugin uploads source maps + tags the release with the deploy commit so
          # Sentry resolves prod stack traces to original source. Omitting the token silently
          # skips the upload (see astro.config.mjs). The plugin reads SENTRY_AUTH_TOKEN by name;
          # the org auth token lives in the SENTRY_CI_TOKEN secret.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_CI_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=kalandra-tech
