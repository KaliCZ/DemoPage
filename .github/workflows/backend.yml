name: Backend

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_run:
    workflows: ["E2E"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

  build-and-push:
    needs: test
    if: >
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/src/Kalandra.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Oracle Cloud (blue-green)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            MAX_ATTEMPTS=20

            # Pull the new image
            docker pull $IMAGE

            # Determine which slot is active (blue=8080, green=8081)
            if docker ps --format '{{.Names}}' | grep -q kalandra-api-blue; then
              OLD_NAME="kalandra-api-blue"
              NEW_NAME="kalandra-api-green"
              NEW_PORT=8081
            else
              OLD_NAME="kalandra-api-green"
              NEW_NAME="kalandra-api-blue"
              NEW_PORT=8080
            fi
            echo "Active: $OLD_NAME → Deploying: $NEW_NAME on port $NEW_PORT"

            # Clean up any leftover container with the new name
            docker stop $NEW_NAME 2>/dev/null || true
            docker rm $NEW_NAME 2>/dev/null || true

            # Start new container on its slot port
            docker run -d \
              --name $NEW_NAME \
              --restart unless-stopped \
              --network host \
              -e ASPNETCORE_URLS=http://+:$NEW_PORT \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e "ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION_STRING }}" \
              -e "Auth__SupabaseProjectUrl=${{ secrets.SUPABASE_PROJECT_URL }}" \
              -e "Auth__SupabaseJwtSecret=${{ secrets.SUPABASE_JWT_SECRET }}" \
              $IMAGE

            # Wait for the new container to become healthy
            echo "Waiting for new container on port $NEW_PORT..."
            ATTEMPTS=0
            until curl -sf http://localhost:$NEW_PORT/health > /dev/null 2>&1; do
              ATTEMPTS=$((ATTEMPTS + 1))
              if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                echo "New container failed to start. Rolling back..."
                docker stop $NEW_NAME || true
                docker rm $NEW_NAME || true
                exit 1
              fi
              echo "Attempt $ATTEMPTS/$MAX_ATTEMPTS — waiting 3s..."
              sleep 3
            done
            echo "New container is healthy on port $NEW_PORT."

            # Switch Caddy upstream to the new port (zero-downtime swap)
            cat > ~/Caddyfile << EOF
            api.kalandra.tech {
                reverse_proxy localhost:$NEW_PORT
            }
            EOF
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile

            # Stop the old container
            docker stop $OLD_NAME 2>/dev/null || true
            docker rm $OLD_NAME 2>/dev/null || true

            echo "Deployment complete — $NEW_NAME serving on port $NEW_PORT."

      - name: Verify public endpoint
        uses: KaliCZ/verify-deployment@v1
        with:
          health-url: https://api.kalandra.tech/health
          max-attempts: 20
          retry-interval: 5
          expected-content: ${{ github.sha }}
