name: deploy-temporal

# Temporal is a backing service like the database — kept out of the app pipeline
# (ci-cd.yml) because it changes rarely and the app deploy assumes it is already
# running. Manual trigger only: initial setup, a version bump of the units, or
# recovery. Idempotent — a warm re-run with unchanged config leaves the running
# server alone.
#
# Persistence lives in the SAME Supabase Postgres the API uses, in dedicated
# `temporal` and `temporal_visibility` databases that auto-setup creates on the
# first (cold) run. Required configuration:
#   vars.TEMPORAL_DB_HOST        — Supabase Postgres host (direct/session, not the transaction pooler)
#   vars.TEMPORAL_DB_PORT        — usually 5432
#   secrets.TEMPORAL_DB_USER     — Postgres role allowed to create databases
#   secrets.TEMPORAL_DB_PASSWORD
#   vars.TEMPORAL_UI_USERNAME    — basic-auth user for temporal.kalandra.tech
#   secrets.TEMPORAL_UI_PASSWORD — basic-auth password (bcrypt-hashed on the VM at deploy time)
on:
  workflow_dispatch:

concurrency:
  group: deploy-temporal
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-temporal:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Sync Temporal Quadlet units to VM (staging)
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345  # v1.0.0
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "infra/quadlet/kalandra-temporal.container,infra/quadlet/kalandra-temporal-ui.container,infra/quadlet/temporal.caddy"
          target: "/home/${{ vars.OCI_USERNAME }}/temporal-staging/"
          strip_components: 2
          # Own staging dir, wiped per run — never shared with the app deploy's staging.
          rm: true

      - name: Bring up Temporal
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        env:
          TEMPORAL_DB_HOST: ${{ vars.TEMPORAL_DB_HOST }}
          TEMPORAL_DB_PORT: ${{ vars.TEMPORAL_DB_PORT }}
          TEMPORAL_DB_USER: ${{ secrets.TEMPORAL_DB_USER }}
          TEMPORAL_DB_PASSWORD: ${{ secrets.TEMPORAL_DB_PASSWORD }}
          TEMPORAL_UI_USERNAME: ${{ vars.TEMPORAL_UI_USERNAME }}
          TEMPORAL_UI_PASSWORD: ${{ secrets.TEMPORAL_UI_PASSWORD }}
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          # A cold first-init runs both schema setups against Supabase before the
          # server listens; warm restarts are up in seconds.
          command_timeout: 10m
          envs: TEMPORAL_DB_HOST,TEMPORAL_DB_PORT,TEMPORAL_DB_USER,TEMPORAL_DB_PASSWORD,TEMPORAL_UI_USERNAME,TEMPORAL_UI_PASSWORD
          script: |
            set -euo pipefail
            UNIT_DIR="$HOME/.config/containers/systemd"
            STAGING="$HOME/temporal-staging"
            mkdir -p "$UNIT_DIR"

            command -v podman >/dev/null 2>&1 \
              || { echo "podman not installed — see SETUP.md §3.2 (host setup)"; exit 1; }
            podman ps --filter name=caddy --filter status=running --format '{{.Names}}' | grep -qx caddy \
              || { echo "Shared Caddy not running — see SETUP.md §3.3 (shared Caddy)"; exit 1; }
            [ -d /srv/caddy/sites ] \
              || { echo "/srv/caddy/sites missing — see SETUP.md §3.3 (shared Caddy)"; exit 1; }
            [ -n "$TEMPORAL_UI_USERNAME" ] && [ -n "$TEMPORAL_UI_PASSWORD" ] \
              || { echo "::error::TEMPORAL_UI_USERNAME / TEMPORAL_UI_PASSWORD must be set — they gate temporal.kalandra.tech"; exit 1; }

            wait_for_listen() {  # $1=unit  $2=port  $3=timeout_secs
              unit="$1"; port="$2"; timeout="$3"; waited=0
              echo "Waiting for $unit on :$port (up to ${timeout}s)…"
              while :; do
                if systemctl --user is-failed --quiet "$unit"; then
                  echo "::error::$unit entered a failed state"
                  systemctl --user status "$unit" --no-pager | head -40 || true
                  journalctl --user -u "$unit" --no-pager | tail -60 || true
                  return 1
                fi
                if ss -ltn | grep -q ":$port "; then echo "$unit listening on :$port"; return 0; fi
                if [ "$waited" -ge "$timeout" ]; then
                  echo "::error::$unit did not listen on :$port within ${timeout}s"
                  systemctl --user status "$unit" --no-pager | head -40 || true
                  journalctl --user -u "$unit" --no-pager | tail -60 || true
                  return 1
                fi
                sleep 3; waited=$((waited + 3))
              done
            }

            # ----- 1. Server env. TLS on, host verification off — Supabase's cert
            # chain isn't in the VM's trust store, and the connection is
            # egress-only to a pinned host. -----
            umask 077
            cat > "$HOME/kalandra-temporal.env.new" << EOF
            DB=postgres12
            DB_PORT=${TEMPORAL_DB_PORT}
            POSTGRES_SEEDS=${TEMPORAL_DB_HOST}
            POSTGRES_USER=${TEMPORAL_DB_USER}
            POSTGRES_PWD=${TEMPORAL_DB_PASSWORD}
            DBNAME=temporal
            VISIBILITY_DBNAME=temporal_visibility
            POSTGRES_TLS_ENABLED=true
            POSTGRES_TLS_DISABLE_HOST_VERIFICATION=true
            SQL_TLS_ENABLED=true
            SQL_TLS_DISABLE_HOST_VERIFICATION=true
            DEFAULT_NAMESPACE=default
            DEFAULT_NAMESPACE_RETENTION=168h
            BIND_ON_IP=127.0.0.1
            TEMPORAL_BROADCAST_ADDRESS=127.0.0.1
            TEMPORAL_ADDRESS=127.0.0.1:7233
            EOF
            NEEDS_RESTART=0
            cmp -s "$HOME/kalandra-temporal.env.new" "$HOME/kalandra-temporal.env" 2>/dev/null || NEEDS_RESTART=1
            mv -f "$HOME/kalandra-temporal.env.new" "$HOME/kalandra-temporal.env"

            # ----- 2. Install units; restart only when the env or a unit changed —
            # a warm no-op re-run must not bounce a healthy server. -----
            cmp -s "$STAGING/kalandra-temporal.container" "$UNIT_DIR/kalandra-temporal.container" 2>/dev/null || NEEDS_RESTART=1
            cp "$STAGING/kalandra-temporal.container" "$STAGING/kalandra-temporal-ui.container" "$UNIT_DIR/"
            systemctl --user daemon-reload

            systemctl --user reset-failed kalandra-temporal.service 2>/dev/null || true
            if [ "$NEEDS_RESTART" = 1 ] || ! systemctl --user is-active --quiet kalandra-temporal.service; then
              systemctl --user restart kalandra-temporal.service
            else
              echo "env + unit unchanged and server already up — leaving it running"
            fi
            wait_for_listen kalandra-temporal.service 7233 420 || exit 1

            systemctl --user reset-failed kalandra-temporal-ui.service 2>/dev/null || true
            systemctl --user restart kalandra-temporal-ui.service
            wait_for_listen kalandra-temporal-ui.service 8233 90 || exit 1

            # ----- 3. Publish the UI at temporal.kalandra.tech through the shared Caddy.
            # basic_auth is mandatory: the Temporal UI has no sign-in of its own, and an
            # open UI would expose workflow payloads and allow terminating workflows.
            # Hashing happens here so CI only ever stores the plain secret.
            # (Bcrypt output is $-, .- and /-safe for the | sed delimiter.)
            HASH="$(podman exec caddy caddy hash-password --plaintext "$TEMPORAL_UI_PASSWORD")"
            [ -n "$HASH" ] || { echo "::error::caddy hash-password produced no output"; exit 1; }
            sed -e "s|__TEMPORAL_UI_USER__|${TEMPORAL_UI_USERNAME}|" \
                -e "s|__TEMPORAL_UI_PASSWORD_HASH__|${HASH}|" \
                "$STAGING/temporal.caddy" > /srv/caddy/sites/temporal.caddy
            command -v chcon >/dev/null 2>&1 && chcon -t container_file_t /srv/caddy/sites/temporal.caddy || true
            podman exec caddy caddy reload --config /etc/caddy/Caddyfile

            echo "Temporal up — server :7233 (loopback), UI https://temporal.kalandra.tech (basic auth). The API worker connects at localhost:7233."
